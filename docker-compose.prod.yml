# Production stack for the Food Assistant service (single container + data volume).
#
# It joins an EXTERNAL docker network `edge` so the Telegram bot stack can reach
# it by name at http://food-assistant:3000. Create the network once on the host:
#   docker network create edge
# and attach the bot's stack to the same `edge` network (see the bot repo).
#
# CI sets FOOD_IMAGE to a SHA-tagged image loaded from the shipped tarball;
# without it, `food-assistant:latest` is used (manual `up --no-build`).

services:
  food-assistant:
    image: ${FOOD_IMAGE:-food-assistant:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env # LLM_API_KEY, LLM_BASE_URL, LLM_MODEL, SERVICE_TOKEN, ...
    environment:
      PORT: "3000"
      DB_PATH: /data/food-assistant.sqlite
    volumes:
      - fooddata:/data
    networks:
      - edge
    restart: unless-stopped

networks:
  edge:
    external: true

volumes:
  fooddata:
