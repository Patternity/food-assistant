name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: Build
        run: npm run build
      - name: Docker build
        run: docker build -f docker/Dockerfile -t food-assistant:ci .
